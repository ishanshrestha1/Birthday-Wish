<!DOCTYPE html>
<html lang="en">
<head>

<title>Birthday Surprise 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

</head>

<body>

<canvas id="fireworks"></canvas>

<div class="container">
  <div class="card">
    <h1>🎁 A Special Surprise</h1>
    <p>Click below to reveal your birthday message</p>
    <button onclick="reveal()">Open 🎉</button>

    <div class="message" id="msg">
      <h1>🎂 Happy Birthday!</h1>
      <p>
        Wishing you endless happiness, success, and anime-level power-ups 😄✨<br><br>
        May your day be filled with joy, laughter, and unforgettable moments 💖
      </p>
    </div>
  </div>
</div>

<div class="footer">Made by Ishan</div>

<audio id="music" src="https://www.fesliyanstudios.com/play-mp3/387" loop></audio>
